name: Deploy Angular site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Angular project
        run: npm run build -- --output-path=dist/ida-birthday --base-href=/ida_birthday/
        # Replace 'ida-birthday' with your project folder name and base href with your repo name if different

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/ida-birthday'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5